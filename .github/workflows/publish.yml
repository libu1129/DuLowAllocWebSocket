name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.2.3 형태의 태그 push 시 실행

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build DuLowAllocWebSocket.csproj -c Release

      - name: Pack
        run: >
          dotnet pack DuLowAllocWebSocket.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --no-build
          -o ./nupkg

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          -s https://nuget.pkg.github.com/libu1129/index.json
          -k ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
